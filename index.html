<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <title>Kel's Weather App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

  <div class="app">
  <body>
    <header>
        <form id="search-form">
            <input type="search" placeholder="Enter a city" required id="search-input"/>
            <input type="submit" value="Search" id="search-button"/>
        </form>
    </header>
       <h1 class="weather-app-city" id="city">London</h1>
        <div class="weather-app">
    <p class="weather-app-details">
    <span id="time">Thursday 16:35,</span>
    <span id="description"> </span>
    </br>
    Humidity:
    <strong id="humidity"></strong>
    Wind:
    <strong id="wind"></strong>
    </p>
    <div class="weather-app-temp-container">
      <div id="icon"></div>
    <div class="weather-app-temp" id="temp"></div>
    <div class="weather-app-unit" id="unit">°C</div>
    </div>
    </div>
